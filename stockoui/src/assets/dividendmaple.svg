<svg xmlns="http://www.w3.org/2000/svg" width="650" height="650" viewBox="-2015 -2000 4030 4030" role="img" aria-labelledby="title desc">
	<title id="title">DividendMaple Logo</title>
	<desc id="desc">Canadian maple leaf with subtle details and a stock line chart.</desc>

	<defs>
		<!-- Leaf base gradient (keeps Pantone feel but adds depth) -->
		<linearGradient id="leafGrad" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0%" stop-color="#ff4b4b"/>
			<stop offset="40%" stop-color="#d52b1e"/>
			<stop offset="100%" stop-color="#a31812"/>
		</linearGradient>

		<!-- Soft shadow under leaf -->
		<filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
			<feDropShadow dx="0" dy="40" stdDeviation="60" flood-color="#000" flood-opacity="0.5"/>
		</filter>

		<!-- Glow for chart line -->
		<filter id="lineGlow" x="-200%" y="-200%" width="400%" height="400%">
			<feGaussianBlur stdDeviation="18" result="blur"/>
			<feMerge>
				<feMergeNode in="blur"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
		</filter>

		<!-- Clip path using the provided leaf path -->
		<clipPath id="leafClip">
			<use href="#leafPath"/>
		</clipPath>

		<!-- small marker circle for data points -->
		<symbol id="dot">
			<circle r="40" fill="#fff" stroke="#ffd54f" stroke-width="18"/>
		</symbol>
	</defs>

	<!-- subtle background circle to form a badge -->
	<g transform="translate(0,0)">
		<circle cx="0" cy="0" r="1800" fill="#000" opacity="0.02" transform="translate(0,0)"/>
	</g>

	<!-- Main maple leaf -->
	<g transform="translate(0,0)" filter="url(#softShadow)">
		<path id="leafPath" fill="url(#leafGrad)" stroke="#7a0000" stroke-width="28"
		  d="m-90 2030 45-863a95 95 0 0 0-111-98l-859 151 116-320a65 65 0 0 0-20-73l-941-762 212-99a65 65 0 0 0 34-79l-186-572 542 115a65 65 0 0 0 73-38l105-247 423 454a65 65 0 0 0 111-57l-204-1052 327 189a65 65 0 0 0 91-27l332-652 332 652a65 65 0 0 0 91 27l327-189-204 1052a65 65 0 0 0 111 57l423-454 105 247a65 65 0 0 0 73 38l542-115-186 572a65 65 0 0 0 34 79l212 99-941 762a65 65 0 0 0-20 73l116 320-859-151a95 95 0 0 0-111 98l45 863z"/>
	</g>

	<!-- Stock line chart clipped to the leaf shape -->
	<g clip-path="url(#leafClip)">
		<!-- faint grid to suggest chart background -->
		<g stroke="#000" stroke-width="20" opacity="0.77" transform="translate(-600,-400)">
			<path d="M-100 200 V1280 H1600" fill="none"/>
		</g>

		<!-- area under the stock line (subtle gold fill) -->
		<path d="M-400 1200 L-200 980 L0 1060 L200 820 L400 900 L600 700 L900 520 L1200 420 L1600 380 L1600 1200 Z"
			  fill="rgba(255,215,64,0.06)" transform="translate(-200, -400)"/>

		<!-- main stock line (gold) with glow -->
		<path d="M-400 1200
             L-200 980
             L0 1060
             L200 820
             L400 900
             L600 700
             L900 520
             L1200 420
             L1600 200"
			  fill="none"
			  stroke="#ffd54f"
			  stroke-width="80"
			  stroke-linecap="round"
			  stroke-linejoin="round"
			  filter="url(#lineGlow)"
			  transform="translate(-200,-400)"/>

		<!-- crisp white overlay stroke for contrast -->
		<path d="M-400 1200
             L-200 980
             L0 1060
             L200 820
             L400 900
             L600 700
             L900 520
             L1200 420
             L1600 200"
			  fill="none"
			  stroke="#ffffff"
			  stroke-width="22"
			  stroke-linecap="round"
			  stroke-linejoin="round"
			  opacity="0.95"
			  transform="translate(-200,-400)"/>

		<!-- data point markers along the line -->
		<g transform="translate(-200,-400)" fill="#fff" stroke="#ffd54f" stroke-width="18">
			<circle cx="-400" cy="1200" r="60"/>
			<circle cx="-200" cy="980" r="60"/>
			<circle cx="0" cy="1060" r="60"/>
			<circle cx="200" cy="820" r="60"/>
			<circle cx="400" cy="900" r="60"/>
			<circle cx="600" cy="700" r="60"/>
			<circle cx="900" cy="520" r="60"/>
			<circle cx="1200" cy="420" r="72"/>
			<circle cx="1600" cy="200" r="88"/>
		</g>
	</g>

	<!-- subtle outline to make leaf pop on varied backgrounds -->
	<path d="m-90 2030 45-863a95 95 0 0 0-111-98l-859 151 116-320a65 65 0 0 0-20-73l-941-762 212-99a65 65 0 0 0 34-79l-186-572 542 115a65 65 0 0 0 73-38l105-247 423 454a65 65 0 0 0 111-57l-204-1052 327 189a65 65 0 0 0 91-27l332-652 332 652a65 65 0 0 0 91 27l327-189-204 1052a65 65 0 0 0 111 57l423-454 105 247a65 65 0 0 0 73 38l542-115-186 572a65 65 0 0 0 34 79l212 99-941 762a65 65 0 0 0-20 73l116 320-859-151a95 95 0 0 0-111 98l45 863z"
		  fill="none" stroke="#6b0000" stroke-width="18" opacity="0.6"/>

</svg>
